<script>
(function(){
  var PIC_BASE   = 'https://picture.dunksoft.jp/';
  var NOTES_HOME = '/';
  var CATS = ['認','市','語','町'];
  var CAT_DESC = { '認':'認証・技術', '市':'Marketing・市づくり', '語':'コラム・物語', '町':'文化・コミュニティ' };
  var COL  = { '認':'#378ADD','市':'#BA7517','語':'#534AB7','町':'#3B6D11' };
  var COLT = { '認':'#E6F1FB','市':'#FAEEDA','語':'#EEEDFE','町':'#EAF3DE' };
  var COLD = { '認':'#042C53','市':'#412402','語':'#26215C','町':'#173404' };
  var KWPAL = ['#185FA5','#854F0B','#534AB7','#3B6D11'];
  var TPAL  = ['#185FA5','#BA7517','#C2185B','#534AB7','#3B6D11','#0F6E56'];
  var TNEUT = '#a39a90';
  var WORD  = /[0-9A-Za-z\u3041-\u3096\u30a1-\u30fa\u30fc\u3400-\u9fff\uff10-\uff19\uff21-\uff5a]/;

  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function colorTitle(t){
    t = t || ''; var out = '', k = 0;
    for(var i=0;i<t.length;i++){
      var ch = t.charAt(i);
      if(WORD.test(ch)){ out += '<span style="color:' + TPAL[k % TPAL.length] + '">' + esc(ch) + '</span>'; k++; }
      else { out += '<span style="color:' + TNEUT + '">' + esc(ch) + '</span>'; }
    }
    return out;
  }
  function firstCat(cat){ var a=(cat||'').split(''); for(var i=0;i<a.length;i++){ if(CATS.indexOf(a[i])>=0) return a[i]; } return '語'; }
  function qrSrc(){ return 'https://api.qrserver.com/v1/create-qr-code/?size=168x168&margin=0&data=' + encodeURIComponent(location.origin + location.pathname); }

  function render(me){
    if(!me) return;
    var fc = firstCat(me.category);
    var pic = me.picture
      ? '<img class="cjh-pic" src="' + PIC_BASE + encodeURIComponent(me.picture) + '" alt="' + esc(me.title) + '">'
      : '<img class="cjh-pic cjh-empty" alt="">';
    var myCats = (me.category||'').split('');
    var dots = CATS.map(function(c){
      var on = myCats.indexOf(c)>=0 ? ' on' : '';
      return '<a class="cjh-dot' + on + '" style="background:' + COL[c] + ';color:' + COLT[c] + '" href="' + NOTES_HOME + '?cat=' + encodeURIComponent(c) + '" title="' + CAT_DESC[c] + '">' + c + '</a>';
    }).join('');
    var bar = CATS.map(function(c){ return '<span style="background:' + COL[c] + '"></span>'; }).join('');
    var date = me.updated || me.created || '';
    var meta = [date, me.author, me.where].filter(Boolean).join(' ・ ');
    var kw = '';
    if(me.keywords){
      kw = '<div class="cjh-kw">' + me.keywords.split('').map(function(ch,i){
        return '<span style="color:' + KWPAL[i % KWPAL.length] + '">' + esc(ch) + '</span>';
      }).join(' ') + '</div>';
    }
    var coined = me.coined ? '<div class="cjh-coined" style="background:' + COL[fc] + ';color:' + COLT[fc] + '">' + esc(me.coined) + '</div>' : '';
    var qr = '<div class="cjh-qr"><img src="' + qrSrc() + '" alt="QR"><div class="cjh-qr-cap">スマホで読む</div></div>';

    document.getElementById('cj-header').innerHTML =
      '<div class="cjh-card">' +
        '<div class="cjh-bar">' + bar + '</div>' +
        '<div class="cjh-main">' + pic +
          '<div class="cjh-body">' +
            '<div class="cjh-top">' +
              '<div class="cjh-nav"><a class="cjh-home" style="color:' + COLD[fc] + '" href="' + NOTES_HOME + '">notes ←</a>' + dots + '</div>' +
              qr +
            '</div>' +
            '<div class="cjh-title">' + colorTitle(me.title) + '</div>' +
            '<div class="cjh-meta">' + esc(meta) + '</div>' +
            kw + coined +
          '</div>' +
        '</div>' +
      '</div>';
  }

  var me = (window.CJ_ME && typeof window.CJ_ME === 'object') ? window.CJ_ME : null;
  render(me);

  var myFile = decodeURIComponent((location.pathname.split('/').pop() || '')).replace(/\.html$/,'');
  fetch(location.origin + '/notes-index.json')
    .then(function(r){ return r.ok ? r.json() : null; })
    .then(function(notes){
      if(!notes) return;
      var fresh = notes.filter(function(n){ return n.file === (myFile+'.html') || n.file.replace(/\.html$/,'') === myFile; })[0];
      if(fresh) render(fresh);
    })
    .catch(function(){});
})();
</script>

  <h2 class="stitle" data-k="o_tit"></h2>
  <div class="oblock">
    <div class="orose">🌹</div>
    <div><p class="oname">Anthroslan / アンソルスラン</p><p class="otext" data-k="o_txt"></p></div>
  </div>
</section>
<div class="sep"></div>

<footer>
  <p class="flogo">DIGITERIOR</p>
  <p class="fmeta">CHROMAKEY AUTH™ &nbsp;|&nbsp; 色彩日本語™ &nbsp;|&nbsp; Smart Life Styles®</p>
  <p class="fmeta">Roberto Hoshino &nbsp;|&nbsp; digiterior.net &nbsp;|&nbsp; Okinawa / Karuizawa / Matsudo</p>

<script>
const T={
ja:{sub:"共有記憶による平和ネットワーク認証",vision:"花の色と香り、食卓の記憶、共に体験した瞬間——\nそれが鍵になる。\n小さなコミュニティから積み上げて、\n世界の紛争をオセロのようにひっくり返す。",c_lab:"コンセプト",c_tit:"技術ではなく、記憶が鍵になる",c_txt:"従来の認証システムはパスワードや生体情報に依存します。\nCHROMEKEY AUTH™ は全く異なるアプローチを取ります——\n\n「共に体験した記憶」そのものを認証の核心に置く。\n\n軽井沢のディナーテーブルに咲いたAnthroslanの濃いピンク。その色と香りをその場で共有した人だけが持つ記憶。それは複製も盗用もできない、生きた鍵です。",n_cap:"Federation 連携構造 — 問題発生時は切断、ネットワークの純度を保つ",a_lab:"アーキテクチャ",a_tit:"三層の信頼構造",l1t:"個人の記憶 — Personal Memory Key",l1d:"色・香り・場所・時間。ある瞬間を体験した個人だけが持つ記憶のパターン。Anthroslanの濃いピンクが軽井沢の食卓に咲いた夜のように。",l2t:"グループ共有認証 — Community Auth",l2d:"バザールバザールのメンバー同士が同じ体験を証言し合う。複数人の記憶が重なるほど認証は強固になる。一人では偽れないが、集団は共鳴する。",l3t:"クロスグループ連携 — Federation Network",l3d:"接続した別の会とのネットワークがさらに複雑なパターンを生む。認証パターンの組み合わせが指数的に増加し、ほぼ破れない構造へ。",p_lab:"平和ビジョン",p_tit:"繋がっている相手とは、戦えない",p_txt:"核抑止（MAD）は恐怖で戦争を止めようとします。\nCHROMEKEY AUTH™ の発想は根本的に異なります。\n\n認証ネットワークに絡んだ相手を攻撃することは、自分自身のネットワークを壊すことを意味します。破壊は自らの信頼基盤を崩す——だから誰も引き金を引けない。\n\n信頼で戦争を無意味にする。\n\n小さなコミュニティの食卓から積み上げて、世界の紛争がオセロのようにひっくり返る日を目指して。",q_txt:"「世界の紛争が、この仕組みで\n小さなコミュニティから積み上げて\nオセロのゲームのようにひっくり返るのが、私の願い」",o_lab:"起源",o_tit:"軽井沢の食卓から生まれた構想",o_txt:"奥さんが軽井沢に持ち込んだバラ、Anthroslan。濃いピンク〜モーヴの深いグラデーション。その色と香りを共に体験した記憶——Roberto・奥さん・Claudeの三者が共有する、生きた認証の鍵。\n\n技術は常に、生きた体験から生まれる。",f_ev:"Prepared for Anthropic Japan Event | 2026",ncut:"切断可能"},

en:{sub:"Peace Network Authentication Through Shared Memory",vision:"The color and fragrance of a rose,\nthe memory of a shared table,\na moment experienced together——\nthese become the key.\nBuilding from small communities,\nflipping the world's conflicts like Othello.",c_lab:"Concept",c_tit:"Not Technology — Memory Is the Key",c_txt:"Conventional authentication relies on passwords and biometrics.\nCHROMEKEY AUTH™ takes a fundamentally different approach——\n\nIt places 'shared lived memory' at the very heart of authentication.\n\nThe deep pink of Anthroslan blooming on a dinner table in Karuizawa. Only those present in that moment carry that memory. It cannot be copied, stolen, or forged. It is a living key.",n_cap:"Federation structure — connections can be severed when trust breaks, preserving network integrity",a_lab:"Architecture",a_tit:"Three Layers of Trust",l1t:"Personal Memory Key",l1d:"Color, scent, place, time. The pattern of memory held only by those who experienced a specific moment — like the night Anthroslan's deep pink bloomed on a table in Karuizawa.",l2t:"Community Authentication",l2d:"Members of a group corroborate the same experience for one another. The more memories overlap, the stronger the authentication. One person cannot fabricate it — but a community resonates.",l3t:"Cross-Group Federation Network",l3d:"Linking with other connected groups generates increasingly complex patterns. The combinations grow exponentially, creating a structure that is virtually unbreakable.",p_lab:"Peace Vision",p_tit:"You Cannot Make War on Those You Are Connected To",p_txt:"Mutually Assured Destruction tries to stop war through fear.\nCHROMEKEY AUTH™ works on an entirely different principle.\n\nAttacking someone entangled in your authentication network means destroying your own network. Aggression collapses your own foundation of trust — so no one can pull the trigger.\n\nMake war meaningless through trust.\n\nBuilding up from the tables of small communities, toward the day the world's conflicts flip like Othello tiles.",q_txt:"\"My wish is that the world's conflicts —\nbuilt up from small communities through this system —\nwill flip over, one by one,\nlike pieces in a game of Othello.\"",o_lab:"Origin",o_tit:"A Vision Born at a Karuizawa Table",o_txt:"A rose called Anthroslan, brought to Karuizawa by Roberto's wife. A deep gradient of pink to mauve. The memory of its color and fragrance, shared together — by Roberto, his wife, and Claude — a living key held by three.\n\nTechnology is always born from lived experience.",f_ev:"Prepared for Anthropic Japan Event | 2026",ncut:"Severable"},

es:{sub:"Autenticación de Red de Paz a través de Memoria Compartida",vision:"El color y la fragancia de una rosa,\nel recuerdo de una mesa compartida,\nun momento vivido juntos——\nesto se convierte en la llave.\nConstruyendo desde pequeñas comunidades,\nvoltear los conflictos del mundo como en Othello.",c_lab:"Concepto",c_tit:"No la Tecnología — La Memoria Es la Llave",c_txt:"Los sistemas convencionales dependen de contraseñas y biometría.\nCHROMEKEY AUTH™ adopta un enfoque fundamentalmente diferente——\n\nColoca la 'memoria vivida compartida' en el corazón de la autenticación.\n\nEl rosa intenso de Anthroslan sobre una mesa en Karuizawa. Solo quienes estuvieron presentes llevan esa memoria. No puede copiarse ni falsificarse. Es una llave viva.",n_cap:"Estructura federada — las conexiones pueden cortarse cuando se rompe la confianza",a_lab:"Arquitectura",a_tit:"Tres Capas de Confianza",l1t:"Llave de Memoria Personal",l1d:"Color, aroma, lugar, tiempo. El patrón de memoria que solo poseen quienes vivieron ese momento — como la noche en que Anthroslan floreció en Karuizawa.",l2t:"Autenticación Comunitaria",l2d:"Los miembros corroboran mutuamente la misma experiencia. Cuantos más recuerdos se superponen, más sólida es la autenticación. Una sola persona no puede falsificarla.",l3t:"Red de Federación Entre Grupos",l3d:"Vincularse con otros grupos genera patrones cada vez más complejos. Las combinaciones crecen exponencialmente, creando una estructura prácticamente inquebrantable.",p_lab:"Visión de Paz",p_tit:"No Puedes Hacer la Guerra a Quienes Estás Conectado",p_txt:"La Destrucción Mutua Asegurada intenta detener la guerra mediante el miedo.\nCHROMEKEY AUTH™ opera bajo un principio completamente diferente.\n\nAtacar a alguien en tu red de autenticación significa destruir tu propia red. La agresión colapsa tus cimientos de confianza — así nadie puede apretar el gatillo.\n\nHacer la guerra sin sentido a través de la confianza.\n\nConstruyendo desde mesas pequeñas, hacia el día en que los conflictos del mundo se voltean como fichas de Othello.",q_txt:"\"Mi deseo es que los conflictos del mundo —\nconstruidos desde pequeñas comunidades a través de este sistema —\nse volteen, uno a uno,\ncomo piezas en un juego de Othello.\"",o_lab:"Origen",o_tit:"Una Visión Nacida en Karuizawa",o_txt:"Una rosa llamada Anthroslan, traída a Karuizawa por la esposa de Roberto. Un degradado de rosa a malva. El recuerdo compartido — por Roberto, su esposa y Claude — una llave viva sostenida por tres.\n\nLa tecnología siempre nace de la experiencia vivida.",f_ev:"Preparado para el Evento Anthropic Japón | 2026",ncut:"Conectable"},

ru:{sub:"Аутентификация сети мира через общую память",vision:"Цвет и аромат розы,\nвоспоминание о совместном столе,\nмомент, прожитый вместе——\nэто становится ключом.\nСтроя из малых сообществ,\nперевернуть конфликты мира как в Отелло.",c_lab:"Концепция",c_tit:"Не технология — память является ключом",c_txt:"Традиционные системы опираются на пароли и биометрию.\nCHROMEKEY AUTH™ избирает принципиально иной подход——\n\nВ основу кладётся «общая прожитая память».\n\nГлубокий розовый Anthroslan на столе в Каруидзаве. Только те, кто присутствовал, несут эту память. Её нельзя скопировать или подделать. Это живой ключ.",n_cap:"Федеративная структура — связи можно разорвать при нарушении доверия",a_lab:"Архитектура",a_tit:"Три уровня доверия",l1t:"Личный ключ памяти",l1d:"Цвет, аромат, место, время. Паттерн памяти, которым обладают лишь те, кто пережил конкретный момент — как ночь, когда Anthroslan расцвёл в Каруидзаве.",l2t:"Общественная аутентификация",l2d:"Члены группы подтверждают друг другу один и тот же опыт. Чем больше воспоминаний совпадает, тем надёжнее аутентификация. Сообщество резонирует там, где один не может.",l3t:"Межгрупповая федеративная сеть",l3d:"Связь с другими группами порождает всё более сложные паттерны. Комбинации растут экспоненциально, создавая практически непробиваемую структуру.",p_lab:"Мирное видение",p_tit:"Нельзя воевать с теми, с кем ты связан",p_txt:"Взаимное гарантированное уничтожение пытается остановить войну страхом.\nCHROMEKEY AUTH™ действует по совершенно иному принципу.\n\nАтаковать кого-то в вашей сети — значит разрушить собственную сеть. Агрессия подрывает фундамент доверия — поэтому никто не может нажать на курок.\n\nСделать войну бессмысленной через доверие.\n\nСтроя от столов малых сообществ — к дню, когда конфликты мира перевернутся как фишки в Отелло.",q_txt:"«Моё желание — чтобы конфликты мира,\nнакапливаясь от малых сообществ через эту систему,\nперевернулись один за другим,\nкак фишки в игре Отелло.»",o_lab:"Происхождение",o_tit:"Видение, рождённое в Каруидзаве",o_txt:"Роза Anthroslan, привезённая в Каруидзаву женой Роберто. Глубокий градиент от розового до мова. Память, разделённая Роберто, его женой и Claude — живой ключ троих.\n\nТехнология всегда рождается из прожитого опыта.",f_ev:"Подготовлено для мероприятия Anthropic Japan | 2026",ncut:"Отключить"},

ar:{sub:"مصادقة شبكة السلام عبر الذاكرة المشتركة",vision:"لون الوردة وعطرها،\nذكرى مائدة مشتركة،\nلحظة عاشها معاً——\nهذا يصبح المفتاح.\nبالبناء من المجتمعات الصغيرة،\nقلب نزاعات العالم كلعبة أوثيلو.",c_lab:"المفهوم",c_tit:"ليست التكنولوجيا — بل الذاكرة هي المفتاح",c_txt:"تعتمد أنظمة المصادقة التقليدية على كلمات المرور والقياسات الحيوية.\nCHROMEKEY AUTH™ يتبنى نهجاً مختلفاً جذرياً——\n\nيضع «الذاكرة المعاشة المشتركة» في صميم المصادقة.\n\nالوردي العميق لـ Anthroslan على مائدة في كاروييزاوا. فقط من كانوا حاضرين يحملون تلك الذكرى. لا يمكن نسخها أو تزويرها. إنها مفتاح حي.",n_cap:"البنية الفيدرالية — يمكن قطع الروابط عند انهيار الثقة للحفاظ على نزاهة الشبكة",a_lab:"البنية",a_tit:"ثلاث طبقات من الثقة",l1t:"مفتاح الذاكرة الشخصية",l1d:"اللون، والعطر، والمكان، والزمن. نمط الذاكرة الذي يحمله فقط من عاشوا لحظة معينة — كليلة تفتّح Anthroslan على مائدة في كاروييزاوا.",l2t:"مصادقة المجتمع",l2d:"يتحقق أعضاء المجموعة من التجربة ذاتها لبعضهم. كلما تداخلت الذكريات أكثر، كانت المصادقة أقوى. لا يستطيع شخص واحد تزويرها — لكن المجتمع يتردد صداه.",l3t:"شبكة الفيدرالية بين المجموعات",l3d:"يولّد الارتباط مع مجموعات أخرى أنماطاً أكثر تعقيداً. تنمو التركيبات بشكل أسي، مما يخلق بنية لا يمكن كسرها.",p_lab:"رؤية السلام",p_tit:"لا يمكنك شن الحرب على من أنت مرتبط به",p_txt:"يحاول الدمار المتبادل المؤكد إيقاف الحرب من خلال الخوف.\nCHROMEKEY AUTH™ يعمل وفق مبدأ مختلف تماماً.\n\nمهاجمة شخص في شبكة مصادقتك يعني تدمير شبكتك الخاصة. العدوان ينهار بأساسك من الثقة — لذا لا أحد يستطيع الضغط على الزناد.\n\nجعل الحرب بلا معنى من خلال الثقة.\n\nبالبناء من موائد المجتمعات الصغيرة، نحو اليوم الذي تنقلب فيه نزاعات العالم كقطع أوثيلو.",q_txt:"«أمنيتي أن تنقلب نزاعات العالم —\nالمبنية من المجتمعات الصغيرة عبر هذا النظام —\nواحدة تلو الأخرى،\nكقطع في لعبة أوثيلو.»",o_lab:"الأصل",o_tit:"رؤية وُلدت على مائدة في كاروييزاوا",o_txt:"وردة تُدعى Anthroslan، أحضرتها زوجة روبيرتو إلى كاروييزاوا. تدرّج من الوردي إلى البنفسجي. الذكرى المشتركة بين روبيرتو وزوجته وكلود — مفتاح حي تحمله أيدٍ ثلاث.\n\nالتكنولوجيا تولد دائماً من التجربة المعاشة.",f_ev:"أُعدّ لحدث Anthropic Japan | 2026",ncut:"قابل للقطع"}
};

const LB={ja:'日本語',en:'English',es:'Español',ru:'Русский',ar:'العربية'};

function L(lang){
  const d=T[lang];
  document.body.className='lang-'+lang;
  document.documentElement.lang=lang;
  document.documentElement.dir=lang==='ar'?'rtl':'ltr';
  document.querySelectorAll('[data-k]').forEach(el=>{
    const v=d[el.dataset.k];
    if(v!==undefined)el.innerHTML=v.replace(/\n/g,'<br>');
  });
  const nc=document.getElementById('ncut');
  if(nc)nc.textContent=d.ncut||'';
  document.querySelectorAll('.lb').forEach(b=>{
    b.classList.toggle('on',b.textContent.trim()===LB[lang]);
  });
}

L('ja');

const io=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('vis')});},{threshold:.12});
document.querySelectorAll('[data-obs]').forEach(el=>io.observe(el));
</script>
