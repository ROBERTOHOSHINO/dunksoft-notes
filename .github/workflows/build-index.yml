# .github/workflows/build-index.yml
# *.html をpushすると notes-index.json を自動メンテナンス（星C index-bot）
# ・新規ノート → 雛形エントリを自動追加（title自動取得）
# ・整合チェック結果は Actions のログに日本語レポート
# ・変更があれば自動コミット
name: notes-index 自動メンテ

on:
  push:
    paths:
      - "*.html"
  workflow_dispatch: {}   # 手動実行ボタン

jobs:
  build-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: インデックス更新＆整合レポート
        run: python3 build_notes_index.py --write

      - name: 変更があればコミット
        run: |
          git config user.name  "index-bot 星C"
          git config user.email "actions@users.noreply.github.com"
          git add notes-index.json
          git diff --cached --quiet || git commit -m "auto: notes-index.json 自動更新 [index-bot]"
          git push
