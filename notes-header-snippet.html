<!--
  COLOURFUL JAPAN 共通ヘッダー v2.1 (3ドメイン対応)
  ─────────────────────────────────────────────
  ・各 html-notes の <body> 直後にこの一式を貼るだけ
  ・notes-index.json は「自分が表示されているドメイン」から取得
    → notes.dunksoft.jp / notes.digiterior.net / pages.dev すべてで動作
  ・QR: MY_QR='' なら自分のURLから自動生成（ドメインごとに正しいQRが出る）
        静的に焼き込みたいページだけ MY_QR にdata-URIを入れる
-->
<!-- ═══════════════════════════════════════════════════════════
     COLOURFUL JAPAN 共通ヘッダー  v2 (QR対応)
     ・各 html-notes の <body> 直後にこの一式を貼り付け
     ・notes-index.json から自分のメタデータを自動取得
     ・QR: MY_QR があればそれを表示（このページは静的QRを焼き込み）
            無ければ各ページのURLから自動生成
     ═══════════════════════════════════════════════════════════ -->
<div id="cj-header"></div>

<style>
  #cj-header { padding:28px 4% 0; font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic',sans-serif; }
  .cjh-card {
    background:#FAFAF8; border:0.5px solid rgba(0,0,0,0.1);
    border-radius:12px; overflow:hidden; margin:0 auto 1.5rem;
    max-width:860px; display:flex; flex-direction:column;
  }
  .cjh-pic {
    width:100%; max-height:240px; object-fit:cover; display:block;
    background:#e8e6e0;
  }
  .cjh-pic.cjh-empty { display:none; }
  .cjh-body { padding:18px 22px 20px; }
  .cjh-top { display:flex; justify-content:space-between; align-items:flex-start; gap:14px; margin-bottom:12px; }
  .cjh-nav { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .cjh-home {
    font-size:12px; letter-spacing:.1em; color:#6b6b66;
    text-decoration:none; margin-right:6px; white-space:nowrap;
  }
  .cjh-home:hover { color:#1a1a18; }
  .cjh-dot {
    width:32px; height:32px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:15px; font-weight:500; text-decoration:none;
    opacity:.35; transition:opacity .15s, transform .1s;
  }
  .cjh-dot:hover { transform:scale(1.1); opacity:.85; }
  .cjh-dot.on { opacity:1; }
  .cjh-dot.on:hover { opacity:1; }
  .cjh-d-認 { background:#378ADD; color:#E6F1FB; }
  .cjh-d-市 { background:#BA7517; color:#FAEEDA; }
  .cjh-d-語 { background:#534AB7; color:#EEEDFE; }
  .cjh-d-町 { background:#3B6D11; color:#EAF3DE; }
  .cjh-qr { flex-shrink:0; text-align:center; }
  .cjh-qr img {
    width:84px; height:84px; display:block; border-radius:5px;
    background:#fff; padding:3px; border:0.5px solid rgba(0,0,0,0.08);
  }
  .cjh-qr-cap { font-size:10px; color:#6b6b66; margin-top:4px; letter-spacing:.06em; }
  .cjh-title { font-size:21px; font-weight:500; line-height:1.5; margin-bottom:7px; color:#1a1a18; }
  .cjh-meta { font-size:12px; color:#6b6b66; letter-spacing:.05em; }
  .cjh-kw { font-size:12px; color:#6b6b66; margin-top:9px; letter-spacing:.1em; }
  .cjh-coined {
    display:inline-block; font-size:12px; margin-top:10px;
    padding:4px 12px; border-radius:12px;
    background:#EEEDFE; color:#3C3489; letter-spacing:.02em; line-height:1.6;
  }
  @media (min-width: 720px) {
    .cjh-card { flex-direction:row; align-items:stretch; }
    .cjh-pic { width:200px; max-height:none; flex-shrink:0; }
    .cjh-body { flex:1; min-width:0; }
  }
</style>

<script>
(function(){
  var NOTES_BASE = location.origin + '/';  // どのドメインでも自分の所から読む（3ドメイン対応）
  var PIC_BASE   = 'https://picture.dunksoft.jp/';
  var CATS = ['認','市','語','町'];
  var CAT_DESC = { '認':'認証・技術', '市':'Marketing・市づくり', '語':'コラム・物語', '町':'文化・コミュニティ' };

  // このページ専用の静的QR（外部サービスに依存しない）。
  // 他のnotesでは空文字 '' にしておけば、ページURLから自動生成されます。
  var MY_QR = '';

  var myFile = decodeURIComponent(location.pathname.split('/').pop() || '');
  if (!myFile) myFile = 'index.html';

  fetch(NOTES_BASE + 'notes-index.json')
    .then(function(r){ return r.json(); })
    .then(function(notes){
      var me = notes.filter(function(n){ return n.file === myFile; })[0];
      if (!me) { renderFallback(); return; }
      render(me, notes);
    })
    .catch(function(){ renderFallback(); });

  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function qrSrc(){
    if (MY_QR) return MY_QR;
    var url = location.origin + location.pathname;
    return 'https://api.qrserver.com/v1/create-qr-code/?size=168x168&margin=0&data=' + encodeURIComponent(url);
  }
  function qrTag(){
    return '<div class="cjh-qr"><img src="' + qrSrc() + '" alt="QR"><div class="cjh-qr-cap">スマホで読む</div></div>';
  }

  function pickFallbackPicture(me, notes){
    var myCats = (me.category||'').split('');
    var cands = notes.filter(function(n){
      if (!n.picture) return false;
      var nc = (n.category||'').split('');
      return nc.some(function(c){ return myCats.indexOf(c) >= 0; });
    }).map(function(n){ return n.picture; });
    if (!cands.length) return '';
    return cands[Math.floor(Math.random()*cands.length)];
  }

  function render(me, notes){
    var pic = me.picture || pickFallbackPicture(me, notes);
    var picTag = pic
      ? '<img class="cjh-pic" src="' + PIC_BASE + encodeURIComponent(pic) + '" alt="' + esc(me.title) + '">'
      : '<img class="cjh-pic cjh-empty" alt="">';

    var myCats = (me.category||'').split('');
    var dots = CATS.map(function(c){
      var on = myCats.indexOf(c) >= 0 ? ' on' : '';
      return '<a class="cjh-dot cjh-d-' + c + on + '" href="' + NOTES_BASE + '?cat=' + encodeURIComponent(c) +
             '" title="' + CAT_DESC[c] + '">' + c + '</a>';
    }).join('');

    var date = me.updated || me.created || '';
    var meta = [date, me.author, me.where].filter(Boolean).join(' ・ ');
    var kw = me.keywords ? '<div class="cjh-kw">' + me.keywords.split('').join(' ') + '</div>' : '';
    var coined = me.coined ? '<div class="cjh-coined">' + esc(me.coined) + '</div>' : '';

    document.getElementById('cj-header').innerHTML =
      '<div class="cjh-card">' + picTag +
        '<div class="cjh-body">' +
          '<div class="cjh-top">' +
            '<div class="cjh-nav"><a class="cjh-home" href="' + NOTES_BASE + '">notes ←</a>' + dots + '</div>' +
            qrTag() +
          '</div>' +
          '<div class="cjh-title">' + esc(me.title) + '</div>' +
          '<div class="cjh-meta">' + esc(meta) + '</div>' +
          kw + coined +
        '</div>' +
      '</div>';
  }

  function renderFallback(){
    document.getElementById('cj-header').innerHTML =
      '<div class="cjh-card"><div class="cjh-body">' +
      '<div class="cjh-top">' +
      '<div class="cjh-nav"><a class="cjh-home" href="' + NOTES_BASE + '">notes ←</a>' +
      '<a class="cjh-dot cjh-d-認 on" href="' + NOTES_BASE + '">認</a>' +
      '<a class="cjh-dot cjh-d-市 on" href="' + NOTES_BASE + '">市</a>' +
      '<a class="cjh-dot cjh-d-語 on" href="' + NOTES_BASE + '">語</a>' +
      '<a class="cjh-dot cjh-d-町 on" href="' + NOTES_BASE + '">町</a></div>' +
      qrTag() +
      '</div></div></div>';
  }
})();
</script>
<!-- ═══════════ /COLOURFUL JAPAN 共通ヘッダー ═══════════ -->
